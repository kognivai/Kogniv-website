<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary Meta -->
    <title>Kogniv — AI Consulting for Enterprise Transformation</title>
    <meta name="description" content="Kogniv is the AI consulting company powered by KAFE — our Agentic AI Factory on ServiceNow. We help enterprises unshackle from legacy systems using purpose-built AI agents." />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://kogniv.com/" />
    <meta property="og:title"       content="Kogniv — AI Consulting for Enterprise Transformation" />
    <meta property="og:description" content="We build AI that transforms how you work. Deep ServiceNow expertise + purpose-built AI agents that deliver measurable outcomes." />
    <meta property="og:image"       content="/opengraph.jpg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name"   content="Kogniv" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Kogniv — AI Consulting for Enterprise Transformation" />
    <meta name="twitter:description" content="We build AI that transforms how you work. Deep ServiceNow expertise + purpose-built AI agents." />
    <meta name="twitter:image"       content="/opengraph.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts — preconnect first, then non-blocking load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" /></noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
